name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_USERNAME: superuser
  MONGO_PASSWORD: ${{secrets.MONGO_PASSWORD}}
  
jobs:
    unit-testing:
        name: Unit Testing
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup NodeJS Version
          uses: actions/setup-node@v4
          with:
            node-version: 20
    
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          run: npm test
          
        - name: Archive Test Result
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result
            path: test-results.xml

    code-coverage:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Setup Nodejs
          uses: actions/setup-node@v6
          with:
            node-version: 18

        - name: Install dependencies
          run: npm install
          
        - name: Code coverage
          continue-on-error: true
          run: npm run coverage
          
        - name: Upload artifact
          if: always()
          uses: actions/upload-artifact@v7
          with:
            name: Code-Coverage-Result
            path: coverage
            retention-days: 5  
    
    docker:
      runs-on: ubuntu-latest
              
    dev-deploy:
      needs: docker
      runs-on: ubuntu-latest
      environment:
        name: development
      steps:
        - run: |
             sleep 60
             kubectl -n kube-system get pod
             set +e
             REPO_OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
             kubectl run solar --image ghcr.io/${REPO_OWNER_LC}/solar-system:${{ github.sha }} \
                  --env MONGO_URI=${{ env.MONGO_URI}} \
                  --env MONGO_USERNAME=${{ env.MONGO_USERNAME}} \
                  --env MONGO_PASSWORD=${{ env.MONGO_PASSWORD}}
             set -e
             echo "kubectl returned $?"
             kubectl -n default get pod
             sleep 10